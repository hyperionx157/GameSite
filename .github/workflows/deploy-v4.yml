name: Deploy to GitHub Pages - v4

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Replace Firebase Config with Real Keys
        run: |
          # Create a simple replacement script that handles special characters
          cat > replace-config.js << 'EOF'
          const fs = require('fs');
          
          // Read the file
          let content = fs.readFileSync('live-user-tracker.js', 'utf8');
          
          // Replace all placeholders with actual values
          content = content.replace(/"YOUR_API_KEY_HERE"/g, '"${{ secrets.FIREBASE_API_KEY }}"');
          content = content.replace(/"YOUR_AUTH_DOMAIN_HERE"/g, '"${{ secrets.FIREBASE_AUTH_DOMAIN }}"');
          content = content.replace(/"YOUR_PROJECT_ID_HERE"/g, '"${{ secrets.FIREBASE_PROJECT_ID }}"');
          content = content.replace(/"YOUR_STORAGE_BUCKET_HERE"/g, '"${{ secrets.FIREBASE_STORAGE_BUCKET }}"');
          content = content.replace(/"YOUR_MESSAGING_SENDER_ID_HERE"/g, '"${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"');
          content = content.replace(/"YOUR_APP_ID_HERE"/g, '"${{ secrets.FIREBASE_APP_ID }}"');
          content = content.replace(/"YOUR_MEASUREMENT_ID_HERE"/g, '"${{ secrets.FIREBASE_MEASUREMENT_ID }}"');
          
          // Write the file back
          fs.writeFileSync('live-user-tracker.js', content);
          console.log('Firebase config replaced successfully');
          EOF
          
          # Run the replacement script
          node replace-config.js
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ACTIONS_TOKEN }}
          publish_dir: .

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build and Deploy
        run: |
          # Create environment file with production values
          cat > .env.production << 'EOF'
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          EOF
          
          # Replace placeholders in live-user-tracker.js
          sed -i 's/process\.env\.FIREBASE_API_KEY/"process.env.FIREBASE_API_KEY"/g' live-user-tracker.js
          sed -i 's/process\.env\.FIREBASE_AUTH_DOMAIN/"process.env.FIREBASE_AUTH_DOMAIN"/g' live-user-tracker.js
          sed -i 's/process\.env\.FIREBASE_PROJECT_ID/"process.env.FIREBASE_PROJECT_ID"/g' live-user-tracker.js
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .

name: Deploy to GitHub Pages - WORKING

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Replace Firebase Config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          # Use environment variables in Node.js
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('live-user-tracker.js', 'utf8');
          content = content.replace(/\"YOUR_API_KEY_HERE\"/g, '\"' + process.env.FIREBASE_API_KEY + '\"');
          content = content.replace(/\"YOUR_AUTH_DOMAIN_HERE\"/g, '\"' + process.env.FIREBASE_AUTH_DOMAIN + '\"');
          content = content.replace(/\"YOUR_PROJECT_ID_HERE\"/g, '\"' + process.env.FIREBASE_PROJECT_ID + '\"');
          content = content.replace(/\"YOUR_STORAGE_BUCKET_HERE\"/g, '\"' + process.env.FIREBASE_STORAGE_BUCKET + '\"');
          content = content.replace(/\"YOUR_MESSAGING_SENDER_ID_HERE\"/g, '\"' + process.env.FIREBASE_MESSAGING_SENDER_ID + '\"');
          content = content.replace(/\"YOUR_APP_ID_HERE\"/g, '\"' + process.env.FIREBASE_APP_ID + '\"');
          content = content.replace(/\"YOUR_MEASUREMENT_ID_HERE\"/g, '\"' + process.env.FIREBASE_MEASUREMENT_ID + '\"');
          fs.writeFileSync('live-user-tracker.js', content);
          console.log('Firebase config replaced successfully');
          "
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ACTIONS_TOKEN }}
          publish_dir: .

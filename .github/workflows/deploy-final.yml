name: Deploy to GitHub Pages - FINAL

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Replace Firebase Config
        run: |
          # Use sed for simple replacements
          sed -i 's/"YOUR_API_KEY_HERE"/"${{ secrets.FIREBASE_API_KEY }}"/g' live-user-tracker.js
          sed -i 's/"YOUR_AUTH_DOMAIN_HERE"/"${{ secrets.FIREBASE_AUTH_DOMAIN }}"/g' live-user-tracker.js
          sed -i 's/"YOUR_PROJECT_ID_HERE"/"${{ secrets.FIREBASE_PROJECT_ID }}"/g' live-user-tracker.js
          sed -i 's/"YOUR_STORAGE_BUCKET_HERE"/"${{ secrets.FIREBASE_STORAGE_BUCKET }}"/g' live-user-tracker.js
          sed -i 's/"YOUR_MESSAGING_SENDER_ID_HERE"/"${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}"/g' live-user-tracker.js
          sed -i 's/"YOUR_APP_ID_HERE"/"${{ secrets.FIREBASE_APP_ID }}"/g' live-user-tracker.js
          sed -i 's/"YOUR_MEASUREMENT_ID_HERE"/"${{ secrets.FIREBASE_MEASUREMENT_ID }}"/g' live-user-tracker.js
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.ACTIONS_TOKEN }}
          publish_dir: .

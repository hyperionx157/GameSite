<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWF Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            max-width: 100%;
            max-height: 100vh;
        }
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        .loading {
            color: #4ecdc4;
            font-size: 18px;
            margin: 20px;
        }
        #swf-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #ruffle {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>
    <div class="container">
        <div id="swf-container">
            <div class="loading">Loading SWF file...</div>
        </div>
    </div>

    <script>
        // Get the SWF file URL from query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const swfFile = urlParams.get('file');
        
        if (!swfFile) {
            document.getElementById('swf-container').innerHTML = 
                '<div class="error">No SWF file specified. Please provide a file parameter.</div>';
        } else {
            // Create Ruffle player
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            
            // Configure player
            player.style.width = "100%";
            player.style.height = "100%";
            
            // Load the SWF file
            player.load({
                url: swfFile,
                backgroundColor: "#000000",
                quality: "high",
                scale: "showAll",
                align: "middle",
                allowFullscreen: true
            }).then(() => {
                console.log("SWF loaded successfully");
                document.querySelector('.loading').style.display = 'none';
            }).catch(error => {
                console.error("Error loading SWF:", error);
                document.getElementById('swf-container').innerHTML = 
                    '<div class="error">Error loading SWF file: ' + error.message + '</div>';
            });
            
            // Add player to container
            document.getElementById('swf-container').appendChild(player);
        }
    </script>
</body>
</html>
